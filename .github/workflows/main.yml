name: Build MyChallenge Stable
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # هذه هي الخطوة اللي نجحت معنا سابقاً (تستخدم حاوية Docker داخلية مستقرة)
      - name: Buildozer Android Build
        uses: Android-Actions/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.11
          subcommand: debug

      - name: Extract Stealth Data
        run: |
          echo "--- [ SECRET REPORT ] ---"
          grep "platform" main.py || echo "No platform info found"
          echo "--- [ END ] ---"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyChallenge-Final
          path: bin/*.apk
