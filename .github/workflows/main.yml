name: Build MyChallenge with Docker
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Docker (The Stable Way)
        uses: docker://ghcr.io/kivy/buildozer:master
        with:
          args: --version android debug

      - name: Extract Stealth Data
        run: |
          echo "--- [ STARTING SECRET REPORT ] ---"
          grep "platform" main.py || echo "No platform info found"
          echo "--- [ END OF REPORT ] ---"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyChallenge-Package
          path: bin/*.apk
