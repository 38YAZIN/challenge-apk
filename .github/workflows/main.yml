name: Build MyChallenge APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Buildozer and Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Build with Buildozer
        run: |
          yes | buildozer -v android debug
          
      - name: Extract Stealth Data
        run: |
          echo "--- [ STARTING SECRET REPORT ] ---"
          grep "platform" main.py || echo "No platform info found"
          echo "--- [ END OF REPORT ] ---"

      - name: Upload APK
        uses: actions/upload-artifact@v4 # لاحظ هنا استخدمنا الشحطة العادية -
        with:
          name: MyChallenge-Package
          path: bin/*.apk
