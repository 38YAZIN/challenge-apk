name: Build APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev libssl-dev \
          cmake ant autoconf automake libtool ccache
          pip install --user --upgrade "buildozer>=1.5.0" "cython<3.0"

      - name: Clean and Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          # حذف المجلدات المؤقتة القديمة لضمان بناء نظيف
          rm -rf .buildozer/
          rm -rf bin/
          buildozer android clean
          # بدء البناء مع قبول التراخيص
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: challenge-apk
          path: bin/*.apk
