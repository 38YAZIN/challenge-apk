name: Build APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer & Cython
        run: |
          # نتجنب apt-get update لتفادي خطأ 100 ونثبت الأدوات مباشرة عبر pip
          pip install --user --upgrade "buildozer>=1.5.0" "cython<3.0"

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          # مسح أي ملفات قديمة وبدء البناء
          rm -rf .buildozer/
          buildozer android clean
          # قبول التراخيص وبدء البناء (سيعمل السيرفر على تحميل المتطلبات داخلياً)
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: challenge-apk
          path: bin/*.apk
