name: Build Flight Tracker APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Docker
        run: |
          docker pull ghcr.io/kivy/buildozer:latest
          
          # تشغيل البناء مع حل مشكلة الـ Root (USER=buildozer)
          docker run --rm \
            -e USER=buildozer \
            -v ${{ github.workspace }}:/home/user/hostproxy \
            -v ${{ github.workspace }}/.buildozer:/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlightTracker-App
          path: bin/*.apk
