name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Docker
        uses: docker://ghcr.io/kivy/buildozer:latest
        with:
          args: android debug
        env:
          BUILDOZER_ALLOW_ORG_TEST_DOMAIN: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: challenge-apk
          path: bin/*.apk
