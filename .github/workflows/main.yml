name: Build APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          # حل مشكلة القفل وخطأ 100
          sudo rm /var/lib/dpkg/lock-frontend || true
          sudo rm /var/lib/apt/lists/lock || true
          
          # محاولة التحديث مع خاصية التكرار في حال الفشل
          sudo apt-get update || (sleep 10 && sudo apt-get update)
          
          sudo apt-get install -y build-essential libffi-dev python3-dev libssl-dev \
          cmake ant autoconf automake libtool ccache libncurses5
          
          pip install --user --upgrade "buildozer>=1.5.0" "cython<3.0"

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          rm -rf .buildozer/
          buildozer android clean
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: challenge-apk
          path: bin/*.apk
